<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weaving Type</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.0/lib/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.0/lib/addons/p5.dom.min.js"></script>
    <script src="sketch.js"></script>
  </head>
  <body>
    <div id="controls">
      <label class="text-label">
        Text
        <textarea id="text-input" rows="2" spellcheck="false">threading</textarea>
      </label>
      <label>
        Sample density
        <input id="density-slider" type="range" min="0.02" max="0.35" step="0.01" value="0.1" />
        <span id="density-value">0.10</span>
      </label>
      <label>
        Letter spacing
        <input id="letter-spacing-slider" type="range" min="0" max="0.15" step="0.005" value="0.065" />
        <span id="letter-spacing-value">0.065</span>
      </label>
      <label>
        Within letters
        <input id="within-slider" type="range" min="0" max="2" step="0.05" value="1" />
        <span id="within-value">1.00</span>
      </label>
      <label>
        In gaps
        <input id="between-slider" type="range" min="0" max="2" step="0.05" value="1" />
        <span id="between-value">1.00</span>
      </label>
      <label>
        Line layers
        <input id="layers-slider" type="range" min="1" max="20" step="1" value="10" />
        <span id="layers-value">10</span>
      </label>
      <label>
        Line spacing
        <input id="spacing-slider" type="range" min="0.02" max="0.12" step="0.005" value="0.05" />
        <span id="spacing-value">0.05</span>
      </label>
      <label>
        Layer step
        <input id="step-slider" type="range" min="0.002" max="0.03" step="0.001" value="0.01" />
        <span id="step-value">0.01</span>
      </label>
      <label>
        Stroke weight
        <input id="stroke-slider" type="range" min="0.1" max="2" step="0.1" value="0.5" />
        <span id="stroke-value">0.5</span>
      </label>
      <label>
        Edge jitter
        <input id="jitter-slider" type="range" min="0" max="1" step="0.05" value="0.45" />
        <span id="jitter-value">0.45</span>
      </label>
      <label>
        Sag within letters
        <input id="within-sag-slider" type="range" min="0" max="2" step="0.05" value="0.5" />
        <span id="within-sag-value">0.50</span>
      </label>
      <label>
        Sag in gaps
        <input id="gaps-sag-slider" type="range" min="0" max="2" step="0.05" value="0.5" />
        <span id="gaps-sag-value">0.50</span>
      </label>
      <label>
        Color mode
        <select id="color-mode">
          <option value="monotone">Monotone</option>
          <option value="duotone">Duotone</option>
          <option value="tritone">Tritone</option>
        </select>
      </label>
      <label class="color-label" data-color-slot="0">
        Color 1
        <input id="color-1" type="color" value="#e8dcc8" />
      </label>
      <label class="color-label" data-color-slot="1">
        Color 2
        <input id="color-2" type="color" value="#c45c3e" />
      </label>
      <label class="color-label" data-color-slot="2">
        Color 3
        <input id="color-3" type="color" value="#6b8f71" />
      </label>
      <label>
        Background
        <input id="bg-color" type="color" value="#0c0b0a" />
      </label>
      <button type="button" id="download-svg">Download SVG</button>
      <p class="hint">Supports English and Chinese. Use the text box for Chinese input (IME). Enter starts a new line.</p>
    </div>
  </body>
</html>
